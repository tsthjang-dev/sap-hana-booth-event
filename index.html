<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SAP HANA Booth Event</title>
  <style>
    :root{--bg:#f7f4ff;--card:#ffffffd9;--line:#e8ddff;--text:#352f4d;--muted:#6f6892;--pri:#7f6df1}
    *{box-sizing:border-box} body{margin:0;font-family:Inter,system-ui;color:var(--text);background:linear-gradient(145deg,#faf7ff,#eef9ff 55%,#fff8f3)}
    .wrap{max-width:1040px;margin:0 auto;padding:16px}
    .hero{position:relative;overflow:hidden;background:var(--card);border:1px solid var(--line);border-radius:22px;padding:20px}
    .hero:before{content:'';position:absolute;right:-70px;top:-40px;width:360px;height:200px;background:url('/assets/hero-pattern.svg') center/cover no-repeat;opacity:.28;pointer-events:none;z-index:0}
    .hero > *{position:relative;z-index:1}
    .nav{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px}.nav a{text-decoration:none;color:var(--text);padding:7px 12px;border:1px solid var(--line);border-radius:999px;background:#fff}
    h1{margin:0 0 4px;font-size:30px}.sub{margin:0 0 12px;color:var(--muted);font-size:14px}
    .grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
    .card{background:#fff;border:1px solid #eee6ff;border-radius:14px;padding:12px}
    .label{font-size:13px;color:var(--muted);margin-bottom:4px}
    input,button{width:100%;padding:11px;border-radius:10px;font-size:14px}
    input{border:1px solid #ddd4f6;background:#fff;color:var(--text);margin-top:6px}
    button{border:0;background:linear-gradient(90deg,var(--pri),#6ca2ff);color:#fff;font-weight:700;margin-top:8px;cursor:pointer}
    table{width:100%;border-collapse:collapse}th,td{padding:7px;border-bottom:1px solid #f2ecff;text-align:left;font-size:13px}
    .rank{display:grid;grid-template-columns:38px 1fr 66px;gap:8px;align-items:center;padding:7px;border:1px solid #eee6ff;border-radius:10px;background:#fcfbff;margin-top:6px;font-size:13px}
    .empty{padding:10px;border:1px dashed #dfd5ff;border-radius:10px;color:var(--muted);font-size:13px;text-align:center}
    @media (max-width:860px){.grid{grid-template-columns:1fr}}
  </style>
</head>
<body>
<div class="wrap">
  <section class="hero">
    <div class="nav"><a href="/">메인</a><a href="/teams.html">팀목록</a><a href="/admin.html">관리자</a></div>
    <h1>SAP HANA 5-BOOTH</h1>
    <p class="sub">팀 등록 후 Booth 1부터 시작합니다</p>

    <div class="grid">
      <div class="card">
        <div class="label">TEAM REGISTER</div>
        <input id="teamName" placeholder="팀 이름 (중복 불가)" />
        <input id="m1" placeholder="팀원 1" />
        <input id="m2" placeholder="팀원 2 (선택)" />
        <input id="m3" placeholder="팀원 3 (선택)" />
        <button onclick="registerTeam()">등록 후 Booth 1 시작</button>
      </div>

      <div class="card">
        <div class="label">LIVE SNAPSHOT</div>
        <table><thead><tr><th>팀</th><th>상태</th><th>다음</th></tr></thead><tbody id="teamsTb"></tbody></table>
        <div id="ranking" style="margin-top:8px"></div>
      </div>
    </div>
  </section>
</div>

<script>
function nextBooth(t){for(let i=1;i<=5;i++) if(!t.booths?.[i]?.passed) return i; return null;}
async function registerTeam(){
  const teamName = teamNameEl.value.trim();
  const members = [m1.value,m2.value,m3.value].map(v=>v.trim()).filter(Boolean);
  const r = await fetch('/api/team/start',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({teamName,members})});
  const d = await r.json();
  if(!r.ok) return alert(d.error || '등록 실패');
  localStorage.setItem('selectedTeamKey', d.team.teamKey);
  location.href = `/booth.html?booth=1&team=${encodeURIComponent(d.team.teamKey)}`;
}
async function load(){
  const [tRes,rRes] = await Promise.all([fetch('/api/teams'), fetch('/api/ranking')]);
  const t = await tRes.json(); const rk = await rRes.json();
  teamsTb.innerHTML='';
  const recent = t.teams.slice(0,6);
  if(!recent.length){teamsTb.innerHTML='<tr><td colspan="3" class="empty">아직 등록된 팀이 없습니다</td></tr>';} else {
    recent.forEach(x=>{const n=nextBooth(x);const tr=document.createElement('tr');tr.innerHTML=`<td>${x.teamName}</td><td>${x.status}</td><td>${n?`B${n}`:'완료'}</td>`;teamsTb.appendChild(tr);});
  }
  ranking.innerHTML = rk.ranking.slice(0,5).map((x,i)=>`<div class='rank'><b>#${i+1}</b><div>${x.teamName}</div><div>${x.durationSec}s</div></div>`).join('') || '<div class="empty">완료팀 없음</div>';
}
const teamNameEl=document.getElementById('teamName');
load();
</script>
</body>
</html>
